<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Presensia — Sistem Presensi Modern</title>
    
    <meta name="theme-color" content="#0a0f0d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Mengunci elemen html & body agar pas dengan layar tanpa scrollbar ganda */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100% !important;
            overflow: hidden;
            background-color: #0a0f0d; /* Warna latar belakang gelap biar menyatu */
        }
        
        /* Memaksa iframe mengambil tinggi layar bersih secara mutlak */
        iframe {
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh; /* Mengikuti tinggi dinamis layar HP terkini */
            height: 100svh; /* Mengunci area agar tidak terpotong bar navigasi */
            display: block;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbzoa1myfv0JZ7QAICZxmdPfx9DyZkm1VKWJpMVoIRqcqxqDW2aRA-4KhJ0Wrbd_Hmg3sA/exec" allow="geolocation"></iframe>
</body>
</html>
