<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Presensia — Sistem Presensi Modern</title>
    
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    
    <meta name="theme-color" content="#0a0f0d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Mengunci elemen html & body GitHub agar pas dengan layar penuh perangkat */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100% !important;
            overflow: hidden;
            background-color: #0a0f0d; /* Menyamakan warna luar agar tidak kontras */
        }
        
        /* Solusi Jitu: Memaksa iframe mengambil tinggi layar bersih (viewport height) secara mutlak */
        iframe {
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh; /* Mengikuti tinggi dinamis layar HP terbaru */
            height: 100svh; /* Mengunci area agar tidak terpotong bar navigasi browser */
            display: block;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfyxDi8JYQUJlJoUy652Cg2eOX-dfoD5r0-Mup-9OedtIn9nBYe6U4l3RRnCz0RSGVFrwNg/exec" allow="geolocation"></iframe>
</body>
</html>
