<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Presensia — Sistem Presensi Modern</title>
    
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    
    <meta name="theme-color" content="#0a0f0d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Memaksa elemen induk untuk mengunci layar penuh */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100% !important; 
            width: 100% !important;
            overflow: hidden; 
            background-color: #0a0f0d; 
        }
        
        /* CSS Sakti agar iframe tidak mengecil di Android & iOS */
        iframe { 
            border: none; 
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100% !important; 
            height: 100% !important; 
            min-width: 100%;
            min-height: 100%;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbwrp5JvAoAXCuEILHurdyMaMf0SAUHEqPmm84szGo8PrNtXuEr0V9TjlVl-Qodbja1XwQ/exec" allow="geolocation"></iframe>
</body>
</html>
