<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Presensia — Sistem Presensi Modern</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0f0d;
        }
        /* Gunakan position fixed agar iframe mengunci layar penuh tanpa terpotong address bar browser */
        iframe {
            border: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfyxDi8JYQUJlJoUy652Cg2eOX-dfoD5r0-Mup-9OedtIn9nBYe6U4l3RRnCz0RSGVFrwNg/exec" allow="geolocation; camera; microphone"></iframe>
</body>
</html>
