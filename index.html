<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Presensia — Sistem Presensi Modern</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    
    <meta name="theme-color" content="#0a0f0d">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Mengunci background agar pas dengan warna aplikasi Anda */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background-color: #0a0f0d; 
        }
        /* Memaksa iframe memenuhi layar penuh tanpa celah kosong */
        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
            display: block;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbzoa1myfv0JZ7QAICZxmdPfx9DyZkm1VKWJpMVoIRqcqxqDW2aRA-4KhJ0Wrbd_Hmg3sA/exec" allow="geolocation"></iframe>
</body>
</html>
